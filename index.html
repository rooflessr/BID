<!doctype html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LA Alliance Mobile Investigation</title>
    <script src="https://cdn.tailwindcss.com/3.4.1"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        html, body { height: 100%; margin: 0; overflow: hidden; background: #050508; color: #fff; font-family: 'DM Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        #map-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; }
        
        .mobile-header { position: absolute; top: 0; width: 100%; padding: 20px; background: linear-gradient(to bottom, rgba(5,5,8,1) 0%, rgba(5,5,8,0) 100%); z-index: 10; pointer-events: none; }
        .control-pill { pointer-events: auto; display: inline-flex; background: rgba(0,0,0,0.85); border: 1px solid rgba(255,255,255,0.1); border-radius: 99px; padding: 4px; backdrop-filter: blur(10px); }
        .pill-btn { padding: 8px 16px; font-size: 10px; font-weight: 700; border-radius: 99px; text-transform: uppercase; letter-spacing: 0.05em; transition: all 0.2s; }
        .pill-btn.active { background: #eab308; color: #000; }

        #detail-drawer { position: fixed; bottom: 0; left: 0; width: 100%; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); z-index: 50; }
        #detail-drawer.open { transform: translateY(0); }
        .drawer-content { background: #0f0f14; border-top: 1px solid rgba(255,255,255,0.1); border-radius: 32px 32px 0 0; padding: 24px; padding-bottom: env(safe-area-inset-bottom, 24px); box-shadow: 0 -15px 50px rgba(0,0,0,0.9); }
        .drawer-handle { width: 45px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; margin: 0 auto 24px; }

        @keyframes radar-pulse { 0% { r: 18; opacity: 1; stroke-width: 2; } 100% { r: 50; opacity: 0; stroke-width: 1; } }
        .radar-ring { animation: radar-pulse 2s ease-out infinite; fill: none; pointer-events: none; }
    </style>
</head>
<body>
    <div class="mobile-header flex flex-col items-center gap-4">
        <div class="control-pill">
            <button id="btn-network" class="pill-btn active">Network</button>
            <button id="btn-timeline" class="pill-btn">Timeline</button>
        </div>
    </div>

    <div id="map-container"></div>

    <div id="detail-drawer">
        <div class="drawer-content">
            <div class="drawer-handle" id="close-drawer"></div>
            <div class="flex justify-between items-start mb-4">
                <span id="badge" class="text-[9px] font-mono px-3 py-1.5 rounded-full uppercase tracking-widest font-bold border border-white/10 bg-white/5"></span>
            </div>
            <h2 id="name" class="text-2xl font-bold mb-4"></h2>
            <p id="notes" class="text-gray-400 text-sm leading-relaxed mb-6"></p>
            
            <div class="space-y-3 pt-4 border-t border-white/5">
                <a href="mailto:rroofless1@gmail.com" class="flex items-center justify-between p-4 bg-yellow-500/10 border border-yellow-500/20 rounded-2xl group">
                    <span class="text-yellow-500 text-xs font-bold uppercase tracking-wider">Report Information</span>
                    <span class="text-yellow-500">→</span>
                </a>
                <a href="https://Linktr.ee/rooflesser" target="_blank" class="flex items-center justify-between p-4 bg-white/5 border border-white/10 rounded-2xl">
                    <span class="text-gray-300 text-xs font-bold uppercase tracking-wider">Full Research Index</span>
                    <span class="text-gray-400">↗</span>
                </a>
            </div>
            <div class="mt-4 text-center">
                <span id="source" class="text-[9px] font-mono text-gray-600 uppercase tracking-tighter"></span>
            </div>
        </div>
    </div>

    <script>
        const nodes = [
            {"i":15,"l":"Gary Whitter","c":"P","date":"2025-03-09","n":"Lead Plaintiff. Received $0. Died unclaimed 3/9/2025 in a Westwood alley. Medical Examiner Case 2025-04414.","s":"LA County Coroner Records"},
            {"i":1,"l":"Elizabeth Mitchell","c":"P","date":"2018-01-01","n":"Conflict: Former DCA III City Atty defending City/LAPD. Now Plaintiff Counsel for Alliance.","s":"CA State Bar SBN 251139"},
            {"i":13,"l":"City of LA","c":"G","date":"2020-03-10","n":"Defendant. Paid over $2.5M to SLU/UMK and $5.9M to outside defense counsel.","s":"City Budget Ledger 2022-2024"},
            {"i":16,"l":"617 West 7th St","c":"L","date":"2020-01-01","n":"The 'Hub'. Shared office for Alliance, SLU, and UMK. Sold at 47% discount in 2024.","s":"Assessor Doc #2024-X"},
            {"i":21,"l":"Michele Martinez","c":"P","date":"2022-05-24","n":"Special Master. Paid $713K. Conflict allegations due to simultaneous board seats.","s":"Monitor Invoice Records"},
            {"i":20,"l":"Judge Carter","c":"P","date":"2020-03-15","n":"U.S. District Judge. Presided over settlement while Lead Plaintiff died homeless.","s":"Court File 2:20-cv-02291"}
        ];

        const links = [
            {"s":1,"t":13,"y":"C"}, {"s":15,"t":1,"y":"L"}, {"s":16,"t":1,"y":"L"},
            {"s":21,"t":13,"y":"M"}, {"s":1,"t":21,"y":"C"}, {"s":15,"t":13,"y":"M"}
        ];

        const catColors = { P: "#ffcdff", O: "#b8dcc8", G: "#ff6fff", L: "#e8ff00" };
        const lineColors = { C: "#dc2626", M: "#22c55e", L: "#333" };

        const svg = d3.select("#map-container").append("svg").attr("width", "100%").attr("height", "100%");
        const g = svg.append("g");
        const zoom = d3.zoom().scaleExtent([0.3, 3]).on("zoom", (e) => g.attr("transform", e.transform));
        svg.call(zoom);

        const simulation = d3.forceSimulation(nodes)
            .force("link", d3.forceLink(links).id(d => d.i).distance(130))
            .force("charge", d3.forceManyBody().strength(-700))
            .force("center", d3.forceCenter(window.innerWidth/2, window.innerHeight/2))
            .force("collision", d3.forceCollide().radius(55));

        const link = g.append("g").selectAll("line").data(links).join("line")
            .attr("stroke", d => lineColors[d.y]).attr("stroke-width", 2.5).attr("stroke-opacity", 0.5);

        const node = g.append("g").selectAll("g").data(nodes).join("g").on("click", (e, d) => { e.stopPropagation(); openDrawer(d); });

        node.filter(d => d.i === 15).append("circle").attr("class", "radar-ring").attr("stroke", "#ff3333");

        node.each(function(d) {
            const el = d3.select(this);
            const col = d.i === 15 ? "#ff3333" : catColors[d.c];
            if (d.c === "L") el.append("rect").attr("width", 22).attr("height", 22).attr("x", -11).attr("y", -11).attr("transform", "rotate(45)").attr("fill", col);
            else el.append("circle").attr("r", d.i === 15 ? 18 : 14).attr("fill", col);
        });

        node.append("text").text(d => d.l).attr("dy", 35).attr("text-anchor", "middle").attr("fill", "#fff")
            .style("font-size", "10px").style("font-weight", "600").style("text-shadow", "0 2px 4px #000");

        function openDrawer(d) {
            document.getElementById("detail-drawer").classList.add("open");
            document.getElementById("name").innerText = d.l;
            document.getElementById("notes").innerText = d.n;
            document.getElementById("source").innerText = "Source: " + d.s;
            const b = document.getElementById("badge");
            b.innerText = d.i === 15 ? "PRIMARY VICTIM" : "INVESTIGATION NODE";
            b.style.color = d.i === 15 ? "#ff3333" : "#eab308";
        }

        function closeDrawer() { document.getElementById("detail-drawer").classList.remove("open"); }
        document.getElementById("close-drawer").onclick = closeDrawer;
        svg.on("click", closeDrawer);

        let timelineMode = false;
        const timeScale = d3.scaleTime().domain([new Date(2018, 0, 1), new Date(2026, 0, 1)]).range([100, window.innerHeight - 150]);

        document.getElementById("btn-timeline").onclick = () => {
            timelineMode = true; simulation.stop();
            link.transition().duration(500).attr("stroke-opacity", 0);
            node.transition().duration(800).attr("transform", d => `translate(${window.innerWidth/2},${timeScale(new Date(d.date))})`);
            document.getElementById("btn-timeline").classList.add("active");
            document.getElementById("btn-network").classList.remove("active");
        };

        document.getElementById("btn-network").onclick = () => {
            timelineMode = false; link.transition().duration(500).attr("stroke-opacity", 0.5); simulation.alpha(1).restart();
            document.getElementById("btn-network").classList.add("active");
            document.getElementById("btn-timeline").classList.remove("active");
        };

        simulation.on("tick", () => {
            if (!timelineMode) {
                link.attr("x1", d => d.source.x).attr("y1", d => d.source.y).attr("x2", d => d.target.x).attr("y2", d => d.target.y);
                node.attr("transform", d => `translate(${d.x},${d.y})`);
            }
        });
    </script>
</body>
</html>
